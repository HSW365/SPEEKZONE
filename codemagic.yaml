workflows:
  ios-app-store:
    name: SpeekZone iOS — App Store
    max_build_duration: 90
    instance_type: mac_mini_m2

    environment:
      groups:
        - hsw365media_v2

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.speekzone.app

      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APP_STORE_APP_ID: 6758737787
        APP_VERSION: 1.0.0

      node: 18.19.0
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          pod install
        working_directory: ios/App

      - name: Set iOS version and build number
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" App/Info.plist

          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key @env:APP_STORE_CONNECT_PRIVATE_KEY 2>/dev/null || echo "1")

          NEXT_BUILD=$(($LATEST_BUILD + 1))

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEXT_BUILD" App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $NEXT_BUILD" App/Info.plist

          echo "Version: $APP_VERSION"
          echo "Build: $NEXT_BUILD"
        working_directory: ios/App

      - name: Build and sign IPA
        script: |
          xcode-project use-profiles

          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/SpeekZone.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain /tmp/temporary.keychain"

          xcodebuild \
            -exportArchive \
            -archivePath /tmp/SpeekZone.xcarchive \
            -exportPath /tmp/SpeekZone.ipa \
            -exportOptionsPlist ios/App/exportOptions.plist

      - name: Upload to TestFlight
        script: |
          # Fail fast with a clear message if secrets are missing
          if [ -z "${APP_STORE_CONNECT_KEY_ID:-}" ]; then
            echo "ERROR: APP_STORE_CONNECT_KEY_ID is empty. Add it in Codemagic > Environment variables, group: hsw365media"
            exit 1
          fi
          if [ -z "${APP_STORE_CONNECT_ISSUER_ID:-}" ]; then
            echo "ERROR: APP_STORE_CONNECT_ISSUER_ID is empty. Add it in Codemagic > Environment variables, group: hsw365media"
            exit 1
          fi
          if [ -z "${APP_STORE_CONNECT_PRIVATE_KEY:-}" ]; then
            echo "ERROR: APP_STORE_CONNECT_PRIVATE_KEY is empty. Add it in Codemagic > Environment variables, group: hsw365media"
            exit 1
          fi

          # Strip any stray whitespace from the key id
          KEY_ID=$(printf '%s' "$APP_STORE_CONNECT_KEY_ID" | tr -d '[:space:]')
          echo "Using App Store Connect key: $KEY_ID"

          mkdir -p "$HOME/.appstoreconnect/private_keys"
          printf '%s\n' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$HOME/.appstoreconnect/private_keys/AuthKey_${KEY_ID}.p8"

          xcrun altool \
            --upload-app \
            --type ios \
            --file /tmp/SpeekZone.ipa/App.ipa \
            --apiKey "$KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --verbose

    artifacts:
      - /tmp/SpeekZone.ipa/*.ipa
      - /tmp/SpeekZone.xcarchive/**/*
