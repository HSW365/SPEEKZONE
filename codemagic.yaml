workflows:
  ios-app-store:
    name: SpeekZone iOS — App Store
    max_build_duration: 90
    instance_type: mac_mini_m1
    environment:
      groups:
        - hsw365media
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.speekzone.app
      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APP_STORE_APP_ID: 6758737787
        APP_STORE_CONNECT_MAX_FIND_BUILD_WAIT: "30"
      node: 18.19.0
      xcode: latest
    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Capacitor sync
        script: |
          npx cap sync ios

      - name: Set iOS bundle version
        script: |
          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" \
            --key-id AC7T7RNVVR \
            --issuer-id d2aeeca9-68b4-480e-96e0-edced6996d56 \
            --private-key @file:$CM_BUILD_DIR/AuthKey_AC7T7RNVVR.p8 2>/dev/null || echo "0")
          agvtool new-version -all $(($LATEST_BUILD + 1))
        working_directory: ios/App

      - name: CocoaPods install
        script: pod install
        working_directory: ios/App

      - name: Build and sign for App Store
        script: |
          xcode-project use-profiles
          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/SpeekZone.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain /tmp/temporary.keychain"
          xcodebuild -exportArchive \
            -archivePath /tmp/SpeekZone.xcarchive \
            -exportPath /tmp/SpeekZone.ipa \
            -exportOptionsPlist ios/App/exportOptions.plist

      - name: Publish to TestFlight
        script: |
          app-store-connect publish \
            --path /tmp/SpeekZone.ipa/*.ipa \
            --key-id AC7T7RNVVR \
            --issuer-id d2aeeca9-68b4-480e-96e0-edced6996d56 \
            --private-key @file:$CM_BUILD_DIR/AuthKey_AC7T7RNVVR.p8 \
            --testflight \
            --beta-group "External Testers" \
            --max-find-build-wait 30

    artifacts:
      - /tmp/SpeekZone.ipa/*.ipa
      - /tmp/SpeekZone.xcarchive/**/*
