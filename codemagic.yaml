workflows:
  ios-app-store:
    name: SpeekZone iOS — App Store
    max_build_duration: 90
    instance_type: mac_mini_m1

    environment:
      groups:
        - hsw365media

      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.speekzone.app

      vars:
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
        APP_STORE_APP_ID: 6758737787
        APP_VERSION: 1.0.0

      node: 18.19.0
      xcode: latest

    scripts:
      - name: Install dependencies
        script: |
          npm ci

      - name: Build web app
        script: |
          npm run build

      - name: Sync Capacitor iOS
        script: |
          npx cap sync ios

      - name: Add iOS privacy permissions
        script: |
          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryUsageDescription string SpeekZone needs access to your photo library so you can upload and share photos." App/Info.plist || true

          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string SpeekZone needs access to your camera so you can capture photos and videos." App/Info.plist || true

          /usr/libexec/PlistBuddy -c "Add :NSPhotoLibraryAddUsageDescription string SpeekZone needs permission to save photos and videos to your library." App/Info.plist || true
        working_directory: ios/App

      - name: Install CocoaPods
        script: |
          pod install
        working_directory: ios/App

      - name: Set iOS version and build number
        script: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $APP_VERSION" App/Info.plist

          LATEST_BUILD=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APP_ID" \
            --key-id AC7T7RNVVR \
            --issuer-id d2aeeca9-68b4-480e-96e0-edced6996d56 \
            --private-key @file:$CM_BUILD_DIR/AuthKey_AC7T7RNVVR.p8 2>/dev/null || echo "1")

          NEXT_BUILD=$(($LATEST_BUILD + 1))

          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $NEXT_BUILD" App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $NEXT_BUILD" App/Info.plist

          echo "Version: $APP_VERSION"
          echo "Build: $NEXT_BUILD"
        working_directory: ios/App

      - name: Build and sign IPA
        script: |
          xcode-project use-profiles

          xcodebuild \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath /tmp/SpeekZone.xcarchive \
            clean archive \
            CODE_SIGN_STYLE=Manual \
            OTHER_CODE_SIGN_FLAGS="--keychain /tmp/temporary.keychain"

          xcodebuild \
            -exportArchive \
            -archivePath /tmp/SpeekZone.xcarchive \
            -exportPath /tmp/SpeekZone.ipa \
            -exportOptionsPlist ios/App/exportOptions.plist

      - name: Upload to TestFlight
        script: |
          mkdir -p ~/.appstoreconnect/private_keys

          cp "$CM_BUILD_DIR/AuthKey_AC7T7RNVVR.p8" \
             ~/.appstoreconnect/private_keys/

          xcrun altool \
            --upload-app \
            --type ios \
            --file /tmp/SpeekZone.ipa/App.ipa \
            --apiKey AC7T7RNVVR \
            --apiIssuer d2aeeca9-68b4-480e-96e0-edced6996d56 \
            --verbose

    artifacts:
      - /tmp/SpeekZone.ipa/*.ipa
      - /tmp/SpeekZone.xcarchive/**/*
